<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Car Dashboard ZLINK OPT</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-rotate@0.2.8/dist/leaflet-rotate-src.js"></script>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

    /* MAPA MAIS LEVE */
#map {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
}

/* OVERLAY */
.overlay{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;
}

/* SPEEDOMETER */
.speedo{
    position:absolute;
    left:18%;
    top:52%;
    transform:translate(-50%,-50%);
    width:320px;
    height:320px;
}

svg{width:100%;height:100%;}

/* BASE */
.base{
    fill:rgba(20,20,20,0.55);
    stroke:#1f2a37;
    stroke-width:18;
}

/* ARC MAIS LEVE */
.arc{
    fill:none;
    stroke:#00ff99;
    stroke-width:14;
    stroke-linecap:round;
    transform:rotate(-135deg);
    transform-origin:50% 50%;
}

/* AGULHA SUAVE */
.needle{
    stroke:#ff2d2d;
    stroke-width:4;
    stroke-linecap:round;
    transition:0.35s cubic-bezier(.2,.8,.2,1);
}

/* SPEED TEXT */
.center{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

.speed{
    font-size:96px;
    font-weight:300;
}

.unit{color:#aaa;}

/* INFO */
.info{
    position:absolute;
    bottom:0px;
    width:100%;
    display:flex;
    justify-content:center;
    gap:60px;
    font-size:16px;
    color:#ddd;
    padding: 10px;
    background-color: black;
}

/* TOP */
.top{
    position:absolute;
    top:0px;
    width:100%;
    display:flex;
    justify-content:space-around;
    font-size:16px;
    color:#ddd;
    padding: 10px;
    background-color: black;
}
</style>
</head>

<body>

<div id="map"></div>

<div class="overlay">

<div class="top">
    <div id="time">--:--</div>
    <div id="alt">ALT 0 m</div>
    <div id="avg">AVG 0 km/h</div>
</div>

<div class="speedo">

<svg viewBox="0 0 300 300">

<circle class="base" cx="150" cy="150" r="120"/>
<circle id="arc" class="arc" cx="150" cy="150" r="120"/>

<g id="needleGroup">
<line x1="150" y1="150" x2="150" y2="40"
stroke="#ff2d2d" stroke-width="4"/>
</g>

<circle cx="150" cy="150" r="6" fill="#ff2d2d"/>

</svg>

<div class="center">
<div class="speed" id="speed">0</div>
<div class="unit">km/h</div>
</div>

</div>

<div class="info">
<div id="dist">0.00 km</div>
<div id="coords">0,0</div>
</div>

</div>

<script>

/* MAPA LEVE */
let map = L.map('map',{zoomControl:false}).setView([0,0],18);
let heading = pos.coords.heading || 0;
map.setBearing(heading);

const carIcon = L.icon({
  iconUrl: 'car.png',
  iconSize: [48,48],
  iconAnchor: [24,24]
});
    

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    updateWhenIdle:true,
    keepBuffer:2
}).addTo(map);

let marker=null;

marker = L.marker([lat,lon],{
  icon: carIcon
}).addTo(map);
    
let path=[];
let line=L.polyline([], {color:'#00ff88', weight:3}).addTo(map);

/* CONFIG */
const MAX=220;
const CIRC=754;

/* VARS */
let last=null;
let dist=0;
let speeds=[];

/* CLOCK */
setInterval(()=>{
document.getElementById("time")
.innerText=new Date().toLocaleTimeString();
},1000);

/* DIST */
function getDist(a,b){
const R=6371e3;
const toRad=x=>x*Math.PI/180;

const dLat=toRad(b.lat-a.lat);
const dLon=toRad(b.lon-a.lon);

const s=Math.sin(dLat/2)**2+
Math.sin(dLon/2)**2*
Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat));

return R*(2*Math.atan2(Math.sqrt(s),Math.sqrt(1-s)));
}

/* SPEED OPT (ANTI-LAG ZLINK) */
function setSpeed(v){

v = Math.max(0, Math.min(MAX, v));

document.getElementById("speed").innerText=Math.round(v);

/* ARC */
let pct=v/MAX;
document.getElementById("arc").style.strokeDashoffset=
CIRC*(1-pct);

/* NEEDLE */
let angle=-135 + pct*270;

document.getElementById("needleGroup")
.setAttribute("transform",`rotate(${angle} 150 150)`);
}

/* GPS OTIMIZADO (REDUZ FREQUÊNCIA VISUAL) */
let lastUpdate=0;

navigator.geolocation.watchPosition(pos=>{

let now=Date.now();
if(now-lastUpdate<500) return; // reduz lag ZLink
lastUpdate=now;

let lat=pos.coords.latitude;
let lon=pos.coords.longitude;

let speed=(pos.coords.speed||0)*3.6;
let alt=pos.coords.altitude||0;

/* UI */
document.getElementById("alt").innerText="ALT "+Math.round(alt)+" m";
document.getElementById("coords").innerText=
lat.toFixed(5)+" | "+lon.toFixed(5);

/* MAPA LEVE UPDATE */
if(!marker){
marker=L.marker([lat,lon]).addTo(map);
}else{
marker.setLatLng([lat,lon]);
}

map.setView([lat,lon]);

/* PATH REDUZIDO */
if(path.length>200) path.shift();
path.push([lat,lon]);

line.setLatLngs(path);

/* DIST */
if(last){
dist+=getDist(last,{lat,lon});
}
last={lat,lon};

document.getElementById("dist")
.innerText=(dist/1000).toFixed(2)+" km";

/* AVG */
speeds.push(speed);
if(speeds.length>20) speeds.shift();

let avg=speeds.reduce((a,b)=>a+b,0)/speeds.length;
document.getElementById("avg")
.innerText="AVG "+avg.toFixed(0)+" km/h";

/* SPEED */
setSpeed(speed);

},err=>alert("Ative o GPS"),{
enableHighAccuracy:true,
maximumAge:1000,
timeout:5000
});

</script>

</body>
</html>
